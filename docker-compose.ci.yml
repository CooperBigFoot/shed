# Test clients should use:
#   HFX_S3_TEST_ENDPOINT=http://localhost:9000
#   HFX_S3_TEST_BUCKET=hfx-test-data
#   HFX_S3_TEST_ACCESS_KEY=shedtest
#   HFX_S3_TEST_SECRET_KEY=shedtestsecret
services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: shedtest
      MINIO_ROOT_PASSWORD: shedtestsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: shedtest
      MINIO_ROOT_PASSWORD: shedtestsecret
      HFX_S3_TEST_BUCKET: hfx-test-data
    entrypoint: >
      /bin/sh -c '
      mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD";
      mc mb --ignore-existing "local/$$HFX_S3_TEST_BUCKET";
      printf "reserved for shed HFX integration fixtures\n" | mc pipe "local/$$HFX_S3_TEST_BUCKET/_harness/README.txt";
      '
