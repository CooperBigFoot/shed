name: Build and publish wheels

on:
  push:
    tags: ['pyshed-v*']
  workflow_dispatch:
    inputs:
      upload:
        description: "Upload artifact destination (0=none, 1=testpypi, 2=pypi)"
        required: false
        default: '0'
        type: choice
        options: ['0', '1', '2']
  pull_request:
    paths:
      - '.github/workflows/build-wheels.yaml'
      - 'ci/**'
      - 'crates/python/pyproject.toml'
      - 'crates/python/Cargo.toml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GDAL_VERSION: 3.12.1

jobs:

  build_wheels:
    name: Build macOS arm64 wheel
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: crates/python
          output-dir: wheelhouse
        env:
          CIBW_BUILD: "cp39-macosx_arm64"
          CIBW_ARCHS_MACOS: arm64
          CIBW_ENVIRONMENT_MACOS: >-
            CMAKE_OSX_ARCHITECTURES=arm64
            MACOSX_DEPLOYMENT_TARGET=11.0
            BUILD_PREFIX=${GITHUB_WORKSPACE}/pyshed_libs
            GDAL_HOME=${GITHUB_WORKSPACE}/pyshed_libs
            GDAL_INCLUDE_DIR=${GITHUB_WORKSPACE}/pyshed_libs/include
            GDAL_LIB_DIR=${GITHUB_WORKSPACE}/pyshed_libs/lib
            GDAL_VERSION=${{ env.GDAL_VERSION }}
            PROJ_DATA=${GITHUB_WORKSPACE}/pyshed_libs/share/proj
            PKG_CONFIG_PATH=${GITHUB_WORKSPACE}/pyshed_libs/lib/pkgconfig
            LDFLAGS=-Wl,-rpath,${GITHUB_WORKSPACE}/pyshed_libs/lib
            LIBCLANG_PATH=/Library/Developer/CommandLineTools/usr/lib
          CIBW_BEFORE_ALL_MACOS: |
            brew remove -f --ignore-dependencies liblerc webp zstd libtiff libxcb libxdcmp lcms2 xmlto ghostscript lz4 openjpeg jpeg-turbo libpng xz giflib rtmpdump brotli snappy libavif libzip
            HOMEBREW_NO_AUTO_UPDATE=1 brew install autoconf automake libtool coreutils cmake wget
            bash ./ci/config.sh
          CIBW_BEFORE_BUILD_MACOS: |
            export DYLD_LIBRARY_PATH=${BUILD_PREFIX}/lib:$DYLD_LIBRARY_PATH
            bash ./ci/copy_gdal_data.sh
            bash ./ci/delocate_preflight.sh
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >-
            export DYLD_LIBRARY_PATH=${GITHUB_WORKSPACE}/pyshed_libs/lib:$DYLD_LIBRARY_PATH &&
            delocate-listdeps --depending --all {wheel} &&
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}
          CIBW_TEST_COMMAND: |
            python -c "
            import pyshed
            from pathlib import Path
            pkg = Path(pyshed.__file__).parent
            assert (pkg / '_data' / 'gdal' / 'gdalvrt.xsd').is_file(), 'missing bundled gdal_data'
            assert (pkg / '_data' / 'proj' / 'proj.db').is_file(), 'missing bundled proj.db'
            assert pyshed.__version__, 'missing __version__'
            try:
                pyshed.Engine('/nonexistent/path/to/dataset')
            except pyshed.DatasetError:
                pass
            else:
                raise AssertionError('Engine should reject missing datasets')
            from pyshed import _pyshed
            _pyshed._self_test_proj()
            print('wheel self-test passed; version=' + pyshed.__version__)
            "

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-arm64
          path: ./wheelhouse/*.whl

  publish_test:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build_wheels
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/pyshed-v') && contains(github.ref, 'rc')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.upload == '1')

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TESTPYPI_TOKEN }}

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build_wheels
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/pyshed-v') && !contains(github.ref, 'rc')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.upload == '2')

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
